# Resource library — the FM-to-virtual-cells landscape.
#
# A heterogeneous catalogue of every paper, preprint, dataset, benchmark,
# tool, lab, org, conference, competition, blog post, perspective, editorial,
# funding event, and collaboration touching the talk's argument.
#
# This file is the source of truth. The renderer at
#   scripts/resource_library_build.py
# turns it into docs/talks/fm-to-virtual-cells/resource-library.md with a
# filterable card grid.
#
# It doubles as the future bridge to papermap: items with `kind: paper` and a
# non-empty `papermap_category:` can be exported as papermap node-stubs.

title: "Resource library — FMs to Virtual Cells"
subtitle: >-
  Every paper, tool, org, dataset, event, and signal we've collected on the
  foundation-models-to-virtual-cells story — papers we've read, models named
  in passing, labs to watch, money moves, competitions, perspectives. Use the
  filters to slice by kind, topic, status, org-type, or region.

# ------------------------------------------------------------ controlled vocab
# The renderer fails fast if an item uses a token not declared here.
vocab:
  kind:
    paper: "Peer-reviewed paper, preprint, or workshop submission"
    review: "Review article or perspective synthesising a literature"
    commentary: "Editorial, opinion piece, or short framing commentary"
    tool: "Named model, software package, agent, or platform"
    dataset: "A data resource — atlas, screen, corpus"
    benchmark: "A leaderboard / evaluation suite"
    org: "Lab, institute, company, consortium, or programme"
    event: "Conference, workshop, hackathon, symposium"
    competition: "Open challenge / prize"
    move: "Funding round, hire, collaboration, partnership announcement"
    talk: "Conference talk or invited lecture"
    person: "Researcher or community figure worth following"

  topics:
    - virtual-cell
    - perturbation-prediction
    - foundation-model
    - single-cell
    - pathology
    - genomic
    - protein
    - multimodal
    - spatial
    - signaling
    - lineage
    - proteomics
    - digital-twin
    - agents
    - RL
    - diffusion
    - flow-matching
    - state-space
    - mech-modeling
    - eval
    - interpretability
    - causal
    - generative
    - scaling-laws
    - clinical
    - imaging
    - lab-automation
    - 4d-modeling
    - mass-spec
    - drug-design
    - perturb-seq
    - benchmark
    - competition

  status:
    name-only: "Mentioned only — no paper / preprint yet"
    rumored: "Trail of evidence (slide, tweet, talk) but nothing citable"
    preprint: "Preprint or workshop paper out"
    published: "In a peer-reviewed venue"
    launched: "Product / model released"
    funded: "Funding round or grant announced"
    announced: "Collaboration / partnership / event announced"

  org_type:
    academic: "University lab"
    industry: "Big-tech or pharma R&D"
    biotech: "Biotech or AI-bio startup"
    consortium: "Multi-institution consortium or initiative"
    gov-lab: "Government / national lab"
    foundation: "Non-profit foundation or institute (CZI etc.)"
    outlet: "Journal / blog / press"

  region:
    US: "United States"
    EU: "European Union"
    UK: "United Kingdom"
    CN: "China"
    KR: "South Korea"
    JP: "Japan"
    IL: "Israel"
    global: "Multi-region / unattributed"

# Optional cross-link to the citation-graph view (papermap) for items that have
# a papermap_category set.
papermap_categories:
  - reckoning
  - scfm
  - position
  - other_fm
  - agentic
  - interp
  - arch_response
  - contrarian_theory

